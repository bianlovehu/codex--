<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomoku</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Gomoku</h1>
      <section class="controls" aria-label="Game Controls">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="pvp">Local PvP</option>
          <option value="pve">Player vs AI</option>
        </select>

        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>

        <button id="undo" type="button">Undo</button>
        <button id="reset" type="button">Restart</button>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
      <canvas id="board" width="600" height="600" aria-label="Gomoku Board"></canvas>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
